name: Deploy to Render

on:
  push:
    branches:
      - main

concurrency:
  group: render-deploy-${{ github.repository }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy servicio 1 (RENDER_DEPLOY_HOOK)
        env:
          DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$DEPLOY_HOOK" ]; then
            echo "::warning::RENDER_DEPLOY_HOOK no configurado. Ver RENDER.md seccion Deploy automatico."
            exit 0
          fi
          curl --fail --silent --show-error --request POST "$DEPLOY_HOOK"
          echo "Deploy servicio 1 solicitado en Render."

      - name: Deploy servicio 2 (RENDER_DEPLOY_HOOK_2)
        env:
          DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_2 }}
        run: |
          if [ -z "$DEPLOY_HOOK" ]; then
            echo "::warning::RENDER_DEPLOY_HOOK_2 no configurado. Ver RENDER.md seccion Deploy automatico."
            exit 0
          fi
          curl --fail --silent --show-error --request POST "$DEPLOY_HOOK"
          echo "Deploy servicio 2 solicitado en Render."
